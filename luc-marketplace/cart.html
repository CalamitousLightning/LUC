<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Your Cart — LUC Marketplace</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>

  <header class="site-header">
    <div class="header-inner container">
      <a href="index.html" class="logo">LUC<span class="accent-orange">Marketplace</span></a>
      <div class="header-actions">
        <a href="cart.html" class="icon-link" aria-label="Cart">
          🛒<span class="cart-badge" id="cartBadgeDesktop" hidden>0</span>
        </a>
        <button class="nav-toggle" id="navToggle" aria-label="Toggle menu">☰</button>
      </div>
      <nav class="main-nav" id="mainNav">
        <a href="index.html">Home</a>
        <a href="orders.html">My Orders</a>
        <a href="login.html">Login / Sign Up</a>
        <a href="admin.html" class="nav-admin">Admin Login</a>
      </nav>
    </div>
  </header>

  <main class="container products-section">
    <h2>Your Cart</h2>

    <div id="cartEmpty" class="empty-msg" hidden>
      Your cart is empty. <a href="index.html" style="color:var(--blue); font-weight:700;">Start shopping →</a>
    </div>

    <div id="cartList" class="cart-list"></div>

    <div id="cartSummary" class="cart-summary" hidden>
      <div class="summary-row">
        <span>Items</span>
        <span id="summaryCount"></span>
      </div>
      <div class="summary-row total">
        <span>Total</span>
        <span class="amount">GHS <span id="summaryTotal"></span></span>
      </div>
      <button class="btn btn-primary" id="checkoutBtn" style="margin-top:14px;">Proceed to Checkout</button>
    </div>
  </main>

  <nav class="bottom-nav">
    <a href="index.html"><span class="bn-icon">🏠</span>Home</a>
    <a href="cart.html" class="active"><span class="bn-icon">🛒</span>Cart<span class="cart-badge" id="cartBadgeMobile" hidden>0</span></a>
    <a href="orders.html"><span class="bn-icon">📦</span>Orders</a>
    <a href="login.html"><span class="bn-icon">👤</span>Account</a>
  </nav>

  <footer class="site-footer">
    <p>&copy; 2026 LUC Marketplace — Logozor Unique Computer.</p>
    <p>By Evoxera TEchnology</p>
  </footer>

  <script src="cart.js"></script>
  <script>
    const cartList = document.getElementById("cartList");
    const cartEmpty = document.getElementById("cartEmpty");
    const cartSummary = document.getElementById("cartSummary");
    const summaryCount = document.getElementById("summaryCount");
    const summaryTotal = document.getElementById("summaryTotal");

    function escapeHtml(str) {
      if (!str) return "";
      return str.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");
    }

    function renderCart() {
      const cart = lucGetCart();

      if (cart.length === 0) {
        cartEmpty.hidden = false;
        cartList.innerHTML = "";
        cartSummary.hidden = true;
        return;
      }

      cartEmpty.hidden = true;
      cartSummary.hidden = false;

      cartList.innerHTML = cart
        .map(
          (item) => `
        <div class="cart-item" data-id="${item.id}">
          <img src="${item.image_url || "https://placehold.co/100x100?text=No+Image"}" alt="${escapeHtml(item.name)}" />
          <div class="cart-item-info">
            <h4>${escapeHtml(item.name)}</h4>
            <div class="cart-item-price">GHS ${item.price.toFixed(2)}</div>
            <button class="cart-item-remove" data-id="${item.id}">Remove</button>
          </div>
          <div class="cart-qty-stepper">
            <button type="button" class="qty-dec" data-id="${item.id}">&minus;</button>
            <span>${item.qty}</span>
            <button type="button" class="qty-inc" data-id="${item.id}">+</button>
          </div>
        </div>
      `
        )
        .join("");

      summaryCount.textContent = `${lucCartCount()} item(s)`;
      summaryTotal.textContent = lucCartTotal().toFixed(2);
    }

    cartList.addEventListener("click", (e) => {
      const id = e.target.dataset.id;
      if (!id) return;

      if (e.target.classList.contains("qty-inc")) {
        const item = lucGetCart().find((i) => i.id === id);
        const stock = Number(item?.stock ?? 999);
        lucUpdateQty(id, Math.min((item?.qty || 0) + 1, stock || 999));
        renderCart();
      } else if (e.target.classList.contains("qty-dec")) {
        const item = lucGetCart().find((i) => i.id === id);
        lucUpdateQty(id, (item?.qty || 1) - 1);
        renderCart();
      } else if (e.target.classList.contains("cart-item-remove")) {
        lucRemoveFromCart(id);
        renderCart();
      }
    });

    document.getElementById("checkoutBtn").addEventListener("click", () => {
      window.location.href = "checkout.html";
    });

    document.getElementById("navToggle").addEventListener("click", () => {
      document.getElementById("mainNav").classList.toggle("open");
    });

    renderCart();
  </script>
</body>
</html>
