<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>My Orders — LUC Marketplace</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>

  <header class="site-header">
    <div class="header-inner container">
      <a href="index.html" class="logo">LUC<span class="accent-orange">Marketplace</span></a>
      <div class="header-actions">
        <a href="cart.html" class="icon-link" aria-label="Cart">
          🛒<span class="cart-badge" id="cartBadgeDesktop" hidden>0</span>
        </a>
      </div>
    </div>
  </header>

  <main class="container products-section">
    <h2>My Orders</h2>

    <div id="ordersLoading" class="spinner"></div>

    <div id="notLoggedIn" class="empty-msg" hidden>
      Please <a href="login.html" style="color:var(--blue); font-weight:700;">log in</a> to see your orders.
    </div>

    <div id="ordersEmpty" class="empty-msg" hidden>
      You haven't placed any orders yet. <a href="index.html" style="color:var(--blue); font-weight:700;">Start shopping →</a>
    </div>

    <div id="ordersList"></div>
  </main>

  <nav class="bottom-nav">
    <a href="index.html"><span class="bn-icon">🏠</span>Home</a>
    <a href="cart.html"><span class="bn-icon">🛒</span>Cart<span class="cart-badge" id="cartBadgeMobile" hidden>0</span></a>
    <a href="orders.html" class="active"><span class="bn-icon">📦</span>Orders</a>
    <a href="login.html"><span class="bn-icon">👤</span>Account</a>
  </nav>

  <footer class="site-footer">
    <p>&copy; 2026 LUC Marketplace — Logozor Unique Computer.</p>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-config.js"></script>
  <script src="cart.js"></script>
  <script src="orders.js"></script>
</body>
</html>
